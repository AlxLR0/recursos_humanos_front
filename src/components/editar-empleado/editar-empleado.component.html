<div class="container col-md-6 offset-md-3">
  <div class="card shadow border-warning">
    <div class="card-header bg-warning text-dark">
      <h4>Editar Empleado (ID: {{id}})</h4>
    </div>
    <div class="card-body">
      <form autocomplete="off" (ngSubmit)="actualizar()">
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" name="nombre" [(ngModel)]="empleado.nombre">
        </div>
        <div class="mb-3">
          <label class="form-label">Departamento</label>
          <input type="text" class="form-control" name="departamento" [(ngModel)]="empleado.departamento">
        </div>
        <div class="mb-3">
          <label class="form-label">Sueldo</label>
          <input type="number" class="form-control" name="sueldo" [(ngModel)]="empleado.sueldo">
        </div>
        <div class="text-center">
          <button type="submit" class="btn btn-warning me-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><defs><mask id="SVG9LXuEA4n"><g fill="none" stroke-dasharray="24" stroke-linecap="round" stroke-linejoin="round"><path stroke="#fff" stroke-width="2" d="M2 13.5l4 4l10.75 -10.75"><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.5s" values="24;0"/></path><path stroke="#000" stroke-dashoffset="24" stroke-width="6" d="M7.5 13.5l4 4l10.75 -10.75"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.5s" dur="0.3s" to="0"/></path></g></mask></defs><path fill="currentColor" d="M0 0h24v24H0z" mask="url(#SVG9LXuEA4n)"/><path fill="none" stroke="currentColor" stroke-dasharray="24" stroke-dashoffset="24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7.5 13.5l4 4l10.75 -10.75"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.5s" dur="0.3s" to="0"/></path></svg> Actualizar Cambios</button>
          <button type="button" class="btn btn-secondary" routerLink="/empleados">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
</div>
